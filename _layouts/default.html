<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&display=swap"/>
  <link rel="stylesheet" href="{{ '/assets/css/theme.css' | relative_url }}"/>
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <div class="site-bg"></div>
  <div class="app">
    {% include header.html %}
    <main style="flex: 1">
      {{ content }}
    </main>
    {% include footer.html %}
  </div>
</body>
</html>
