title: "mental·static"
tagline: "a positive interference"
description: "Notes by Zsolt Parragi on C++, Postgres, AI, and other interesting problems"
url: "https://mentalstatic.info"
author:
  name: "Zsolt Parragi"
  email: "dutow@mentalstatic.info"

social:
  github: "https://github.com/dutow"
  rss: "/feed.xml"

about:
  role: "software engineer · research enthusiast"
  bio: |
    I build database guts and related software in **C++** and **Postgres**, and I write here when something has shaped up enough to share.
  chips:
    - "c"
    - "c++"
    - "postgres"
    - "metaprogramming"
    - "benchmarking"
    - "ai / llm"
    - "performance"

permalink: "/blog/:slug/"

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives

jekyll-archives:
  enabled:
    - tags
  layouts:
    tag: tag
  permalinks:
    tag: "/blog/tag/:name/"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - docs
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - node_modules
